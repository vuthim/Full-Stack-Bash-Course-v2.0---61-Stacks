# Application Configuration
# Edit this file to customize your installation

# Server Settings
SERVER_PORT=8080
SERVER_HOST=localhost
SERVER_NAME=MyApp
DEBUG_MODE=false

# Database Settings
DB_HOST=localhost
DB_PORT=5432
DB_NAME=myapp_db
DB_USER=appuser
# DB_PASS - Set this via environment variable

# Logging
LOG_LEVEL=INFO
LOG_FILE=/var/log/myapp/app.log
LOG_MAX_SIZE=100M

# Features
ENABLE_CACHE=true
ENABLE_METRICS=true
ENABLE_CORS=false

# Rate Limiting
RATE_LIMIT_ENABLED=true
RATE_LIMIT_REQUESTS=100
RATE_LIMIT_WINDOW=60

# Backup
BACKUP_ENABLED=true
BACKUP_SCHEDULE="0 2 * * *"
BACKUP_DIR=/var/backups/myapp
BACKUP_RETENTION_DAYS=30